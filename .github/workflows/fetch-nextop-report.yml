name: Fetch Nextop Report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch report
        env:
          NEXTOP_AUTHORIZATION: ${{ secrets.NEXTOP_AUTHORIZATION }}
          NEXTOP_COOKIE: ${{ secrets.NEXTOP_COOKIE }}
          NEXTOP_SATOKEN: ${{ secrets.NEXTOP_SATOKEN }}
          NEXTOP_TEMPLATE_ID: ${{ vars.NEXTOP_TEMPLATE_ID }}
          NEXTOP_PAGE_SIZE: ${{ vars.NEXTOP_PAGE_SIZE }}
          NEXTOP_EXTRA_BODY_JSON: ${{ vars.NEXTOP_EXTRA_BODY_JSON }}
        run: node scripts/fetch-nextop-report.js

      - name: Commit report data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Nextop report data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          cp index.html _site/index.html
          mkdir -p _site/data
          cp data/report.json _site/data/report.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
