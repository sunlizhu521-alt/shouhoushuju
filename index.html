<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>售后工单导出数据</title>
    <style>
      :root {
        color: #17202a;
        background: #f5f7f8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .sidebar {
        background: #ffffff;
        border-right: 1px solid #e2e8ee;
        padding: 22px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #0a735f;
        background: #e8f6f2;
        border: 1px solid #c7e5dd;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        line-height: 1.3;
      }

      h2 {
        font-size: 24px;
        line-height: 1.25;
      }

      .muted,
      .brand p,
      .topbar p {
        color: #667480;
        font-size: 13px;
        line-height: 1.5;
      }

      .side-section {
        border-top: 1px solid #eef2f5;
        padding-top: 17px;
      }

      .section-title {
        color: #41505d;
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 10px;
      }

      .metric-stack,
      .status-stack,
      .field-stack {
        display: grid;
        gap: 10px;
      }

      .metric {
        background: #f8fafb;
        border: 1px solid #e5ebef;
        border-radius: 8px;
        padding: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .metric span {
        color: #61707b;
        font-size: 12px;
      }

      .metric strong {
        font-size: 18px;
      }

      .status-row {
        display: flex;
        gap: 8px;
        align-items: center;
        color: #4c5b66;
        font-size: 13px;
        line-height: 1.45;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .dot.ok {
        background: #13a67d;
      }

      .dot.warn {
        background: #d18b12;
      }

      .dot.neutral {
        background: #8c98a3;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid #dce4ea;
        border-radius: 7px;
        background: #ffffff;
        color: #17202a;
        outline: none;
      }

      input,
      select {
        height: 40px;
        padding: 0 11px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        padding: 10px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .ghost-button,
      .export-button {
        min-height: 38px;
        border-radius: 7px;
        border: 1px solid #dbe3e8;
        background: #ffffff;
        color: #26333f;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .export-button {
        color: #0a735f;
      }

      .notice {
        color: #53626e;
        font-size: 12px;
        line-height: 1.5;
        background: #f8fafb;
        border: 1px solid #e5ebef;
        border-radius: 7px;
        padding: 10px;
      }

      .workspace {
        min-width: 0;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .search-box {
        width: min(520px, 100%);
      }

      .status-filter {
        width: 210px;
      }

      .content-grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 14px;
      }

      .table-panel,
      .detail-panel {
        background: #ffffff;
        border: 1px solid #dde5ea;
        border-radius: 8px;
        overflow: hidden;
      }

      .table-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .table-scroll {
        overflow: auto;
        min-height: 360px;
      }

      table {
        width: 100%;
        min-width: 960px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid #edf1f4;
        text-align: left;
        vertical-align: middle;
        font-size: 13px;
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f9fbfc;
        color: #5b6974;
        font-size: 12px;
        font-weight: 800;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover,
      tbody tr.selected {
        background: #f2fbf8;
      }

      .empty {
        height: 280px;
        color: #73818c;
        text-align: center;
      }

      .pager {
        min-height: 50px;
        border-top: 1px solid #edf1f4;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 13px;
        color: #64727d;
        font-size: 13px;
      }

      .pager div {
        display: flex;
        gap: 6px;
      }

      .pager button {
        width: 32px;
        height: 32px;
        border: 1px solid #dbe3e8;
        border-radius: 6px;
        background: #ffffff;
        display: grid;
        place-items: center;
      }

      .pager button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .detail-panel {
        padding: 16px;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .detail-head {
        display: grid;
        gap: 5px;
      }

      .detail-head span {
        color: #65737f;
        font-size: 12px;
        font-weight: 800;
      }

      .detail-head strong {
        font-size: 17px;
        overflow-wrap: anywhere;
      }

      dl {
        display: grid;
        gap: 9px;
        margin: 0;
      }

      dl div {
        display: grid;
        grid-template-columns: 80px minmax(0, 1fr);
        gap: 10px;
        font-size: 13px;
      }

      dt {
        color: #6c7a85;
      }

      dd {
        margin: 0;
        color: #26333e;
        overflow-wrap: anywhere;
      }

      pre {
        flex: 1;
        min-height: 260px;
        overflow: auto;
        margin: 0;
        padding: 12px;
        color: #26333e;
        background: #f8fafb;
        border: 1px solid #e3e9ed;
        border-radius: 7px;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 980px) {
        .app-shell,
        .content-grid {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid #e2e8ee;
        }
      }

      @media (max-width: 700px) {
        .workspace {
          padding: 14px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .search-box,
        .status-filter,
        .ghost-button,
        .export-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">表</div>
          <div>
            <h1>售后工单导出数据</h1>
            <p>每小时自动导出并解析</p>
          </div>
        </div>

        <section class="side-section">
          <div class="section-title">同步状态</div>
          <div class="status-stack">
            <div class="status-row"><span class="dot neutral" id="modeDot"></span><span id="modeText">加载中</span></div>
            <div class="status-row"><span class="dot ok"></span><span>数据来源：Nextop 导出文件</span></div>
            <div class="status-row"><span class="dot neutral"></span><span id="updatedText">等待数据</span></div>
          </div>
        </section>

        <section class="side-section metric-stack">
          <div class="metric"><span>当前记录</span><strong id="totalMetric">0</strong></div>
          <div class="metric"><span>匹配记录</span><strong id="matchMetric">0</strong></div>
          <div class="metric"><span>字段数量</span><strong id="fieldMetric">0</strong></div>
        </section>

        <section class="side-section">
          <div class="section-title">手动导入 JSON</div>
          <div class="field-stack">
            <textarea id="jsonImport" placeholder="可粘贴 data/report.json 或接口返回 JSON，支持 data.records / records / rows / 数组"></textarea>
            <div class="button-row">
              <button class="ghost-button" id="importButton">导入</button>
              <button class="ghost-button" id="demoButton">示例</button>
            </div>
            <p class="notice" id="notice">正在读取自动同步数据...</p>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2>在线网格</h2>
            <p>字段按导出文件自动生成，支持搜索、状态筛选、详情查看和 CSV 导出。</p>
          </div>
          <button class="export-button" id="exportButton">导出 CSV</button>
        </header>

        <div class="toolbar">
          <input class="search-box" id="searchInput" placeholder="搜索任意字段" />
          <select class="status-filter" id="statusFilter">
            <option value="">全部状态</option>
          </select>
          <button class="ghost-button" id="clearButton">清空筛选</button>
        </div>

        <div class="content-grid">
          <div class="table-panel">
            <div class="table-scroll">
              <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
            <footer class="pager">
              <span id="pageText">第 1 / 1 页，共 0 行</span>
              <div>
                <button id="prevButton" aria-label="上一页">&lt;</button>
                <button id="nextButton" aria-label="下一页">&gt;</button>
              </div>
            </footer>
          </div>

          <aside class="detail-panel">
            <div class="detail-head">
              <span>详情</span>
              <strong id="detailTitle">-</strong>
            </div>
            <dl>
              <div><dt>主键</dt><dd id="detailId">-</dd></div>
              <div><dt>状态</dt><dd id="detailStatus">-</dd></div>
              <div><dt>表单</dt><dd id="detailSheet">-</dd></div>
            </dl>
            <pre id="detailJson">{}</pre>
          </aside>
        </div>
      </section>
    </main>

    <script>
      const pageSize = 15;
      const preferredColumns = [
        "工单编号",
        "工单号",
        "repairOrderNo",
        "客户邮箱",
        "customerEmail",
        "状态",
        "工单状态",
        "statusName",
        "创建时间",
        "createTime",
        "处理人",
        "客服",
        "serviceUserName",
        "摘要",
        "summary",
      ];
      const statusKeys = ["状态", "工单状态", "status", "statusName", "orderStatus"];
      const idKeys = ["repairOrderId", "工单ID", "工单Id", "ID", "id", "repairOrderNo", "工单编号", "工单号", "订单号"];

      const state = {
        rows: [],
        filtered: [],
        columns: [],
        page: 1,
        selectedKey: "",
        mode: "加载中",
      };

      const els = {
        jsonImport: document.querySelector("#jsonImport"),
        importButton: document.querySelector("#importButton"),
        demoButton: document.querySelector("#demoButton"),
        notice: document.querySelector("#notice"),
        modeDot: document.querySelector("#modeDot"),
        modeText: document.querySelector("#modeText"),
        updatedText: document.querySelector("#updatedText"),
        totalMetric: document.querySelector("#totalMetric"),
        matchMetric: document.querySelector("#matchMetric"),
        fieldMetric: document.querySelector("#fieldMetric"),
        exportButton: document.querySelector("#exportButton"),
        searchInput: document.querySelector("#searchInput"),
        statusFilter: document.querySelector("#statusFilter"),
        clearButton: document.querySelector("#clearButton"),
        tableHead: document.querySelector("#tableHead"),
        tableBody: document.querySelector("#tableBody"),
        pageText: document.querySelector("#pageText"),
        prevButton: document.querySelector("#prevButton"),
        nextButton: document.querySelector("#nextButton"),
        detailTitle: document.querySelector("#detailTitle"),
        detailId: document.querySelector("#detailId"),
        detailStatus: document.querySelector("#detailStatus"),
        detailSheet: document.querySelector("#detailSheet"),
        detailJson: document.querySelector("#detailJson"),
      };

      function demoRows() {
        return Array.from({ length: 18 }, (_, index) => ({
          工单编号: `WO-20260705-${1001 + index}`,
          客户邮箱: `customer${index + 1}@example.com`,
          状态: ["待处理", "处理中", "已完成"][index % 3],
          创建时间: new Date(Date.now() - index * 3600 * 1000).toISOString(),
          处理人: ["张敏", "李明", "王佳"][index % 3],
          摘要: `示例导出记录 ${index + 1}`,
          __sheetName: "demo",
        }));
      }

      function extractRows(payload) {
        if (Array.isArray(payload)) return payload;
        if (Array.isArray(payload?.data)) return payload.data;
        if (Array.isArray(payload?.data?.records)) return payload.data.records;
        if (Array.isArray(payload?.data?.rows)) return payload.data.rows;
        if (Array.isArray(payload?.records)) return payload.records;
        if (Array.isArray(payload?.rows)) return payload.rows;
        return [];
      }

      function valueOf(row, keys, fallback = "") {
        for (const key of keys) {
          const value = row?.[key];
          if (value !== undefined && value !== null && String(value).trim() !== "") return String(value);
        }
        return fallback;
      }

      function rowKey(row, index) {
        return valueOf(row, idKeys, `row-${index + 1}`);
      }

      function computeColumns(rows) {
        const keys = [];
        const seen = new Set();
        const add = (key) => {
          if (key && key !== "__rowKey" && !seen.has(key)) {
            seen.add(key);
            keys.push(key);
          }
        };
        preferredColumns.forEach((key) => rows.some((row) => key in row) && add(key));
        rows.forEach((row) => Object.keys(row).forEach(add));
        return keys.slice(0, 28);
      }

      function setRows(rows, mode, message, fetchedAt) {
        state.rows = rows.map((row, index) => ({ ...row, __rowKey: rowKey(row, index) }));
        state.columns = computeColumns(state.rows);
        state.page = 1;
        state.selectedKey = state.rows[0]?.__rowKey || "";
        els.searchInput.value = "";
        els.statusFilter.value = "";
        setNotice(message, mode, fetchedAt);
        render();
      }

      function setNotice(message, mode, fetchedAt) {
        state.mode = mode;
        els.notice.textContent = message;
        els.modeText.textContent = mode;
        els.modeDot.className = mode.includes("成功") ? "dot ok" : mode.includes("失败") ? "dot warn" : "dot neutral";
        els.updatedText.textContent = fetchedAt ? `同步：${formatDate(fetchedAt)}` : `更新：${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
      }

      async function loadSyncedData() {
        try {
          const response = await fetch(`data/report.json?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          const rows = extractRows(payload);
          if (!rows.length) throw new Error("自动同步文件里没有记录");
          setRows(rows, "自动同步成功", `已读取自动导出解析数据：${rows.length} 行。`, payload.fetchedAt);
        } catch (error) {
          setRows(demoRows(), "静态预览", `未读取到自动同步数据，已载入示例。原因：${error.message}`);
        }
      }

      function updateStatusOptions() {
        const current = els.statusFilter.value;
        const statuses = Array.from(new Set(state.rows.map((row) => valueOf(row, statusKeys)).filter(Boolean))).sort();
        els.statusFilter.innerHTML = '<option value="">全部状态</option>' + statuses.map((status) => `<option value="${escapeHtml(status)}">${escapeHtml(status)}</option>`).join("");
        if (statuses.includes(current)) els.statusFilter.value = current;
      }

      function applyFilters() {
        const keyword = els.searchInput.value.trim().toLowerCase();
        const status = els.statusFilter.value;
        state.filtered = state.rows.filter((row) => {
          const haystack = JSON.stringify(row).toLowerCase();
          return (!keyword || haystack.includes(keyword)) && (!status || valueOf(row, statusKeys) === status);
        });
        const totalPages = Math.max(Math.ceil(state.filtered.length / pageSize), 1);
        if (state.page > totalPages) state.page = totalPages;
      }

      function render() {
        updateStatusOptions();
        applyFilters();
        renderTable();
        renderDetail();
        els.totalMetric.textContent = state.rows.length;
        els.matchMetric.textContent = state.filtered.length;
        els.fieldMetric.textContent = state.columns.length;
      }

      function renderTable() {
        const totalPages = Math.max(Math.ceil(state.filtered.length / pageSize), 1);
        const start = (state.page - 1) * pageSize;
        const pageRows = state.filtered.slice(start, start + pageSize);
        els.tableHead.innerHTML = `<tr>${state.columns.map((key) => `<th>${escapeHtml(key)}</th>`).join("")}</tr>`;

        if (!pageRows.length || !state.columns.length) {
          els.tableBody.innerHTML = `<tr><td class="empty" colspan="${Math.max(state.columns.length, 1)}">暂无数据</td></tr>`;
        } else {
          els.tableBody.innerHTML = pageRows.map((row) => `
            <tr class="${row.__rowKey === state.selectedKey ? "selected" : ""}" data-key="${escapeHtml(row.__rowKey)}">
              ${state.columns.map((key) => `<td title="${escapeHtml(row[key] || "")}">${escapeHtml(row[key] || "-")}</td>`).join("")}
            </tr>
          `).join("");
        }

        els.pageText.textContent = `第 ${state.page} / ${totalPages} 页，共 ${state.filtered.length} 行`;
        els.prevButton.disabled = state.page <= 1;
        els.nextButton.disabled = state.page >= totalPages;
      }

      function renderDetail() {
        const selected = state.filtered.find((row) => row.__rowKey === state.selectedKey) || state.filtered[0] || state.rows[0];
        if (!selected) {
          els.detailTitle.textContent = "-";
          els.detailId.textContent = "-";
          els.detailStatus.textContent = "-";
          els.detailSheet.textContent = "-";
          els.detailJson.textContent = "{}";
          return;
        }
        state.selectedKey = selected.__rowKey;
        els.detailTitle.textContent = valueOf(selected, ["工单编号", "工单号", "repairOrderNo"], selected.__rowKey);
        els.detailId.textContent = selected.__rowKey;
        els.detailStatus.textContent = valueOf(selected, statusKeys, "-");
        els.detailSheet.textContent = selected.__sheetName || "-";
        const { __rowKey, ...raw } = selected;
        els.detailJson.textContent = JSON.stringify(raw, null, 2);
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[char]));
      }

      function importJson() {
        try {
          const payload = JSON.parse(els.jsonImport.value);
          const rows = extractRows(payload);
          if (!rows.length) throw new Error("没有识别到列表数据");
          setRows(rows, "JSON 导入成功", `JSON 导入成功，已载入 ${rows.length} 行。`);
        } catch (error) {
          setNotice(`JSON 导入失败：${error.message}`, "导入失败");
        }
      }

      function exportCsv() {
        const header = state.columns;
        const body = state.filtered.map((row) => header.map((key) => row[key] || ""));
        const csv = [header, ...body].map((line) => line.map((value) => `"${String(value).replaceAll('"', '""')}"`).join(",")).join("\n");
        const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "nextop-export-grid.csv";
        link.click();
        URL.revokeObjectURL(url);
      }

      els.importButton.addEventListener("click", importJson);
      els.demoButton.addEventListener("click", () => setRows(demoRows(), "静态预览", "已载入示例数据。"));
      els.exportButton.addEventListener("click", exportCsv);
      els.searchInput.addEventListener("input", () => {
        state.page = 1;
        render();
      });
      els.statusFilter.addEventListener("change", () => {
        state.page = 1;
        render();
      });
      els.clearButton.addEventListener("click", () => {
        els.searchInput.value = "";
        els.statusFilter.value = "";
        state.page = 1;
        render();
      });
      els.prevButton.addEventListener("click", () => {
        state.page = Math.max(1, state.page - 1);
        render();
      });
      els.nextButton.addEventListener("click", () => {
        const totalPages = Math.max(Math.ceil(state.filtered.length / pageSize), 1);
        state.page = Math.min(totalPages, state.page + 1);
        render();
      });
      els.tableBody.addEventListener("click", (event) => {
        const row = event.target.closest("tr[data-key]");
        if (!row) return;
        state.selectedKey = row.dataset.key;
        render();
      });

      loadSyncedData();
    </script>
  </body>
</html>
